name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # API route で参照される。Lighthouse はトップページのみ計測するので
          # 実際の値が不要だがビルドが警告を出さないようダミーを設定
          ANNICT_TOKEN: ${{ secrets.ANNICT_TOKEN || 'dummy-build-token' }}

      - name: Start server
        run: pnpm start &
        env:
          ANNICT_TOKEN: ${{ secrets.ANNICT_TOKEN || 'dummy-runtime-token' }}

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000
          uploadArtifacts: true
          temporaryPublicStorage: true
          # しきい値はゆるめスタート。慣れたら厳しく
          configPath: .lighthouserc.json
